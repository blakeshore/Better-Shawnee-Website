<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - City of Shawnee</title>

  <!-- Tailwind + daisyUI CDN - Fast and easy way to import--> 
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!--Set light/dark mode theme--> 
  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");

      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      } else {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      }
    })();

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      setTheme(next);
    }
    </script>
    <!-- Old sciprt to hide feedbacks for google translate webwidget-->
    <link rel="stylesheet" href="css/googletranslate.css">
    <!-- This is google transalt functions-->
    <script src="scripts/googletranslate.js"></script>
  <script src="scripts/siteparts.js"></script>
    <script
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body class="bg-[url('../graphics/SearchPageBackground.jpg')] bg-cover bg-center bg-fixed min-h-screen flex flex-col">
<div id="google_translate_element" class="hidden"></div>
  <!-- Header -->
  <div id="site-header"></div>
 
  <!-- Main -->
  <main class="flex-1 mt-8">
    <div class="w-full max-w-5xl mx-auto px-4">
      <section class="bg-base-100 rounded-2xl shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-2">Search Results</h1>
        <p class="text-base-content/70 mb-6">
          Results for: <span id="queryText" class="font-semibold text-base-content"></span>
        </p>

        <div id="resultsCount" class="mb-4 text-sm text-base-content/70"></div>

        <div id="resultsList" class="space-y-3"></div>

        <div id="noResults" class="hidden mt-6">
          <div class="alert">
            <span>No matching pages were found.</span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

</body>

</html>
