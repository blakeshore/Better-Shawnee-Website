<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report an Issue - City of Shawnee</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      } else {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      }
    })();
  </script>
  <script src="scripts/siteparts.js"></script>
  <link rel="stylesheet" href="css/googletranslate.css">
  <script src="scripts/googletranslate.js"></script>
  <script src="scripts/siteparts.js"></script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body class="bg-[url('../graphics/HomepageSunsetBackground.jpg')] bg-cover bg-center bg-fixed min-h-screen flex flex-col">
  <div id="google_translate_element" class="hidden"></div>
  <div id="site-header"></div>

    <main class="flex-1 mt-8">
    <div class="w-full max-w-7xl mx-auto px-4">
      <div class="flex min-h-[70vh] bg-base-200 rounded-2xl shadow-lg">
        
        <!-- Sidebar -->
        <aside
          class="w-64 m-4 mr-0 self-stretch bg-base-100 rounded-xl shadow-md p-3">
          <nav>
            <ul class="space-y-2">
              <li><a href="billpay.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Bill Pay</a></li>
              <li><a href="utilities.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Utilities</a></li>
              <li><a href="permits.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Permits</a></li>
              <li><a href="trash_pickup.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Trash Pickup</a></li>
              <li><a href="events.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Events</a></li>
              <li><a href="parks.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Parks</a></li>
              <li><a href="news.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">News</a></li>
              <li><a href="report_issue.html" class="block px-4 py-2 rounded-lg hover:bg-base-300">Report Issue</a></li>
            </ul>
          </nav>
        </aside>
        <!-- Main content -->
        <section class="flex-1 m-4 bg-base-100 rounded-xl shadow-md px-6 py-1">
          <div class="text-sm breadcrumbs mb-2"><ul><li><a href="homepage.html">Home</a></li><li>Report an Issue</li></ul></div>
            <h2 class="text-2xl font-bold mb-4">Report an Issue</h2>
            <p class="mb-6">Use this form to report a problem in Shawnee like a pothole, broken streetlight, or other infrastructure issue. For emergencies, call 911.</p>
            <div class="bg-base-200 p-6 rounded-xl space-y-4">
              <div>
                <label class="label"><span class="label-text font-bold">Your Name</span></label>
                <input type="text" placeholder="First Last" class="input input-bordered w-full">
              </div>
              <div>
                <label class="label"><span class="label-text font-bold">Email Address</span></label>
                <input type="email" placeholder="you@example.com" class="input input-bordered w-full">
              </div>
              <div>
                <label class="label"><span class="label-text font-bold">Issue Type</span></label>
                <select class="select select-bordered w-full">
                  <option disabled selected>Select a category</option>
                  <option>Pothole / Road Damage</option>
                  <option>Streetlight Outage</option>
                  <option>Fallen Tree / Debris</option>
                  <option>Water / Sewer Issue</option>
                  <option>Abandoned Vehicle</option>
                  <option>Other</option>
                </select>
              </div>
              <div>
                <label class="label"><span class="label-text font-bold">Location</span></label>
                <input type="text" placeholder="Street address or intersection" class="input input-bordered w-full">
              </div>
              <div>
                <label class="label"><span class="label-text font-bold">Description</span></label>
                <textarea class="textarea textarea-bordered w-full" rows="4" placeholder="Describe the issue in as much detail as possible."></textarea>
              </div>
              <button class="btn btn-primary w-full">Submit Report</button>
            </div>
          <p class="mt-4"> </p> <!--Extra bottom space-->
        </section>
     </div>
    </div>
  </main>
        

  <div id="site-footer"></div>

</body>
</html>
