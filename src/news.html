<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News - City of Shawnee</title>

  <!-- Tailwind + daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- theme -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      } else {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      }
    })();

    function toggleTheme() {
      const html = document.documentElement;
      html.setAttribute("data-theme", html.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }
  </script>

  <!-- translate -->
  <link rel="stylesheet" href="css/googletranslate.css">
  <script src="scripts/googletranslate.js"></script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- shared header/footer -->
  <script src="scripts/siteparts.js"></script>

  <!-- news system -->
  <script src="data/newsData.js"></script>
  <script src="scripts/renderinfo.js"></script>
</head>

<body class="bg-[url('../graphics/HomepageSunsetBackground.jpg')] bg-cover bg-center bg-fixed min-h-screen flex flex-col">
  <div id="google_translate_element" class="hidden"></div>

  <!-- shared header -->
  <div id="site-header"></div>

  <main class="flex-1 mt-8">
    <div class="w-full max-w-7xl mx-auto px-4">
      <div class="flex min-h-[70vh] bg-base-200 rounded-2xl shadow-lg">

        <section class="flex-1 m-4 bg-base-100 rounded-xl shadow-md px-8 py-6">

          <div class="breadcrumbs text-sm mb-4">
            <ul>
              <li><a href="homepage.html">Home</a></li>
              <li>News</li>
            </ul>
          </div>

          <h1 class="text-3xl font-bold mb-6">City News</h1>

          <div class="flex gap-4 mb-6 items-center">
            <select id="monthbar" class="select select-bordered">
              <option value>Month</option>
              <option value="January">January</option>
              <option value="February">February</option>
              <option value="March">March</option>
              <option value="April">April</option>
              <option value="May">May</option>
              <option value="June">June</option>
              <option value="July">July</option>
              <option value="August">August</option>
              <option value="September">September</option>
              <option value="October">October</option>
              <option value="November">November</option>
              <option value="December">December</option>
            </select>

            <select id="yearbar" class="select select-bordered">
              <option value>Year</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
            </select>

            <button onclick="filterDates()" class="btn btn-primary">
              Filter
            </button>
          </div>

          <!-- dynamic news -->
          <div id="newspage" class="space-y-6"></div>

        </section>
      </div>
    </div>
  </main>

  <!-- shared footer -->
  <div id="site-footer"></div>

  <script>
    renderInfo();
  </script>
</body>
</html>
