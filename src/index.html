<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>daisyUI Demo</title>

  <!-- Tailwind + daisyUI CDN - Fast and easy way to import--> 
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-base-200">

  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-md">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl">MySite</a>
    </div>
    <div class="flex-none">
      <button class="btn btn-primary">Login</button>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero min-h-[40vh] bg-base-200">
    <div class="hero-content text-center">
      <div class="max-w-md">
        <h1 class="text-5xl font-bold">Hello there</h1>
        <p class="py-6">
          This is a simple webpage built using Tailwind CSS and daisyUI components.
        </p>
        <button class="btn btn-secondary">Get Started</button>
      </div>
    </div>
  </div>

  <!-- Card Section -->
  <div class="flex justify-center p-10">
    <div class="card w-96 bg-base-100 shadow-xl">
      <figure>
        <img src="https://picsum.photos/400/200" alt="Example image">
      </figure>
      <div class="card-body">
        <h2 class="card-title">Example Card</h2>
        <p>This card component comes directly from daisyUI.</p>
        <div class="card-actions justify-end">
          <button class="btn btn-accent">Learn More</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer footer-center p-4 bg-base-100 text-base-content">
    <aside>
      <p>Copyright 2026 - Simple daisyUI Page</p>
    </aside>
  </footer>

</body>
</html>
